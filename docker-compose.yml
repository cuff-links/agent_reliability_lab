services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: arl
      POSTGRES_USER: arl
      POSTGRES_PASSWORD: arl
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql

volumes:
  postgres_data:
